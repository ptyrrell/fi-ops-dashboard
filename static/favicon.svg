<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Meridian: the navigator line of the sales pipeline. -->
  <defs>
    <linearGradient id="meridian-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#065f46"/>
    </linearGradient>
    <linearGradient id="meridian-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#meridian-bg)"/>
  <!-- Meridian ring (horizon) -->
  <circle cx="16" cy="16" r="9.5" fill="none" stroke="url(#meridian-ring)" stroke-width="1.6" opacity="0.8"/>
  <!-- Vertical meridian line -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#99f6e4" stroke-width="0.8" opacity="0.7"/>
  <!-- Pulse needle -->
  <path d="M8 22 L13 14 L17 19 L22 10 L25 13" fill="none"
        stroke="#f0fdfa" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Endpoint marker -->
  <circle cx="25" cy="13" r="2.2" fill="#fbbf24"/>
  <circle cx="25" cy="13" r="3.8" fill="none" stroke="#fbbf24" stroke-width="0.8" opacity="0.5"/>
</svg>
