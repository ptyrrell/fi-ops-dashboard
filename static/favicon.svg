<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Background: dark navy rounded square -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- Subtle grid lines -->
  <line x1="5" y1="11" x2="27" y2="11" stroke="#1e3a5f" stroke-width="0.6"/>
  <line x1="5" y1="18" x2="27" y2="18" stroke="#1e3a5f" stroke-width="0.6"/>
  <!-- Pipeline funnel bars — left to right, descending height, teal gradient feel -->
  <rect x="5"  y="8"  width="4" height="16" rx="1.5" fill="#0d9488"/>
  <rect x="11" y="12" width="4" height="12" rx="1.5" fill="#14b8a6" opacity="0.85"/>
  <rect x="17" y="15" width="4" height="9"  rx="1.5" fill="#2dd4bf" opacity="0.7"/>
  <rect x="23" y="19" width="4" height="5"  rx="1.5" fill="#5eead4" opacity="0.55"/>
  <!-- Baseline -->
  <line x1="4" y1="25" x2="28" y2="25" stroke="#0d9488" stroke-width="1.2" stroke-linecap="round"/>
</svg>
